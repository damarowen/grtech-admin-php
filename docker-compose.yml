services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: grtech-admin:latest
    container_name: grtech-admin-app
    restart: always
    ports:
      - "8001:80"
    volumes:
      - ./storage/app:/var/www/html/storage/app
    environment:
      - APP_ENV=${APP_ENV}
      - APP_DEBUG=${APP_DEBUG}
      - DB_CONNECTION=${DB_CONNECTION}
      - DB_DATABASE=${DB_DATABASE}
      - APP_URL=${APP_URL}