services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: grtech-admin:latest
    container_name: grtech-admin-app
    restart: always
    ports:
      - "8001:80"
    volumes:
      - ./storage/app:/var/www/html/storage/app
    environment:
      - APP_ENV=production
      - APP_DEBUG=true
      - DB_CONNECTION=sqlite
      - DB_DATABASE=/var/www/html/storage/app/database.sqlite